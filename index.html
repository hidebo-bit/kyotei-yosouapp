<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競艇 本気展開予想</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#f4f6f8;margin:0;padding:10px}
header{background:#053f8f;color:white;padding:14px;text-align:center;font-weight:bold;font-size:18px;margin:-10px -10px 12px}
.card{background:#fff;padding:14px;border-radius:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
label{font-size:12px;color:#555;display:block;margin-bottom:3px}
input,select{width:100%;box-sizing:border-box;padding:7px 8px;height:38px;border-radius:8px;border:1px solid #ccc;font-size:15px}
button{width:100%;padding:12px;background:#053f8f;color:#fff;border:none;border-radius:10px;font-weight:bold;margin:6px 0}
.saveBtn{background:#117a35}.loadBtn{background:#6b4cff}
.ticket{display:inline-block;font-size:21px;font-weight:bold;background:#eef5ff;padding:8px 10px;border-radius:10px;margin:4px 0}
.hot{background:#fff0e6}.row{padding:6px 0;border-bottom:1px solid #eee}.small{font-size:12px;color:#666}
</style>
</head>
<body>
<header>競艇 本気展開予想アプリ</header>

<div class="card">
<h2>レース設定</h2>
<div class="grid">
<div><label>日付</label><input type="date" id="date"></div>
<div><label>場</label><select id="place">
<option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
<option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
<option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
<option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
<option>芦屋</option><option>福岡</option><option>唐津</option><option>大村</option>
</select></div>
<div><label>レース</label><select id="race"></select></div>
<div><label>資金</label><input type="number" id="bankroll" value="10000"></div>
<div><label>前付け</label><select id="front"><option value="no">なし</option><option value="yes">あり</option></select></div>
<div><label>深イン</label><select id="deep"><option value="low">低</option><option value="mid">中</option><option value="high">高</option></select></div>
<div><label>風向き</label><select id="wind"><option value="normal">普通</option><option value="head">向かい風</option><option value="tail">追い風</option><option value="cross">横風</option></select></div>
<div><label>風速(m)</label><input type="number" step="0.5" id="windSpeed" value="2"></div>
<div><label>波</label><select id="wave"><option value="normal">普通</option><option value="rough">荒れ気味</option><option value="bad">かなり荒れ</option></select></div>
<div><label>潮</label><select id="tide"><option value="none">影響少なめ</option><option value="high">満潮</option><option value="low">干潮</option><option value="rising">上げ潮</option><option value="falling">下げ潮</option></select></div>
<div><label>潮位影響</label><select id="tidePower"><option value="low">低</option><option value="mid">中</option><option value="high">高</option></select></div>
</div>
<button class="loadBtn" onclick="autoLoadRaceData()">選手データ自動取得</button>
<p class="small">※Boatrace Open APIから取得。取れない時は手入力でOK。</p>
</div>

<div id="boats"></div>
<button onclick="predict()">展開予想する</button>

<div class="card">
<h2>予想結果</h2>
<div id="result">ここに結果が出ます</div>
</div>

<script>
function init(){
  document.getElementById("date").value = new Date().toISOString().slice(0,10);
  let race=document.getElementById("race");
  for(let i=1;i<=12;i++){let o=document.createElement("option");o.textContent=i+"R";race.appendChild(o)}
  race.value="10R";

  let html="";
  for(let i=1;i<=6;i++){
    html+=`
    <div class="card">
    <h2>${i}号艇</h2>
    <div class="grid">
      <div><label>選手ID</label><input id="id${i}" placeholder="登録番号"></div>
      <div><label>選手名</label><input id="name${i}" placeholder="選手名"></div>
      <div><label>特徴読込</label><button onclick="loadPlayer(${i})">読込</button></div>
      <div><label>特徴保存</label><button class="saveBtn" onclick="savePlayer(${i})">保存</button></div>

      <div><label>平均ST</label><input type="number" step="0.01" id="avgst${i}" value="0.15"></div>
      <div><label>進入</label><input type="number" id="lane${i}" value="${i}"></div>

      <div><label>逃げ</label><input type="number" id="nige${i}" value="5"></div>
      <div><label>逃がし</label><input type="number" id="nigashi${i}" value="5"></div>
      <div><label>差し</label><input type="number" id="sashi${i}" value="5"></div>
      <div><label>まくり</label><input type="number" id="makuri${i}" value="5"></div>
      <div><label>まくり差し</label><input type="number" id="ms${i}" value="5"></div>
      <div><label>ターン展示</label><input type="number" id="turn${i}" value="6"></div>

      <div><label>展示ST</label><input type="number" step="0.01" id="exst${i}" value="0.15"></div>
      <div><label>展示タイム</label><input type="number" step="0.01" id="ex${i}" value="6.80"></div>
      <div><label>チルト</label><input type="number" step="0.5" id="tilt${i}" value="0"></div>
      <div><label>モーター2連率</label><input type="number" step="0.1" id="motor${i}" value="35"></div>
      <div><label>ボート2連率</label><input type="number" step="0.1" id="boat${i}" value="35"></div>
      <div><label>勝率</label><input type="number" step="0.01" id="win${i}" value="5.00"></div>
    </div>
    </div>`;
  }
  document.getElementById("boats").innerHTML=html;
}

function val(id){return Number(document.getElementById(id).value||0)}
function setVal(id,v){let e=document.getElementById(id); if(e) e.value=v}

function savePlayer(i){
  let id=document.getElementById("id"+i).value;
  if(!id)return alert("選手IDを入力して");
  let data={nige:val("nige"+i),nigashi:val("nigashi"+i),sashi:val("sashi"+i),makuri:val("makuri"+i),ms:val("ms"+i)};
  localStorage.setItem("player_"+id,JSON.stringify(data));
  alert("選手特徴を保存しました");
}

function loadPlayer(i){
  let id=document.getElementById("id"+i).value;
  if(!id)return;
  let data=JSON.parse(localStorage.getItem("player_"+id)||"null");
  if(!data)return;
  setVal("nige"+i,data.nige);setVal("nigashi"+i,data.nigashi);setVal("sashi"+i,data.sashi);setVal("makuri"+i,data.makuri);setVal("ms"+i,data.ms);
}

async function autoLoadRaceData(){
  let date=document.getElementById("date").value;
  let place=document.getElementById("place").value;
  let raceNo=Number(document.getElementById("race").value.replace("R",""));
  let y=date.slice(0,4), ymd=date.replaceAll("-","");
  let programUrl=`https://boatraceopenapi.github.io/programs/v3/${y}/${ymd}.json`;
  let previewUrl=`https://boatraceopenapi.github.io/previews/v3/${y}/${ymd}.json`;

  try{
    let [pRes,prRes]=await Promise.all([fetch(programUrl),fetch(previewUrl)]);
    let programs=await pRes.json();
    let previews=await prRes.json();

    let programRace=findRace(programs,place,raceNo);
    let previewRace=findRace(previews,place,raceNo);

    if(!programRace && !previewRace){
      alert("データが見つかりませんでした。日付・場・Rを確認してね。");
      return;
    }

    applyRaceData(programRace,previewRace);
    predict();
    alert("自動取得しました");
  }catch(e){
    alert("取得失敗：" + e.message);
  }
}

function findRace(data,place,raceNo){
  let found=null;
  function walk(x){
    if(found||!x)return;
    if(Array.isArray(x)){x.forEach(walk);return}
    if(typeof x==="object"){
      let text=JSON.stringify(x);
      let hasPlace=text.includes(place);
      let hasRace=text.includes(`${raceNo}R`)||text.includes(`第${raceNo}`)||text.includes(`"raceNumber":${raceNo}`)||text.includes(`"race_no":${raceNo}`)||text.includes(`"rno":${raceNo}`);
      let hasSix=(text.match(/登録番号|racer|player|name|選手|toban|登番/g)||[]).length>=6;
      if(hasPlace&&hasRace&&hasSix){found=x;return}
      Object.values(x).forEach(walk);
    }
  }
  walk(data);
  return found;
}

function applyRaceData(program,preview){
  let racers=extractRacers(program);
  let previews=extractRacers(preview);

  for(let i=1;i<=6;i++){
    let r=racers[i-1]||{};
    let pr=previews[i-1]||{};

    let id=pick(r,["toban","racer_number","player_id","registration_number","登録番号","id"]);
    let name=pick(r,["name","racer_name","player_name","選手名"]);
    let avgst=pickNum(r,["st","avg_st","average_st","start_timing","平均ST"]);
    let motor=pickNum(r,["motor2","motor_2rate","motor_rate","モーター2連率","motor"]);
    let boat=pickNum(r,["boat2","boat_2rate","boat_rate","ボート2連率","boat"]);
    let win=pickNum(r,["win_rate","rate","national_winning_rate","勝率"]);

    let ex=pickNum(pr,["exhibition_time","展示タイム","exhibition","time"]);
    let exst=pickNum(pr,["exhibition_st","展示ST","st"]);
    let tilt=pickNum(pr,["tilt","チルト"]);
    let lane=pickNum(pr,["course","展示進入","lane"]);

    if(id){document.getElementById("id"+i).value=id;loadPlayer(i)}
    if(name)document.getElementById("name"+i).value=name;
    if(avgst)document.getElementById("avgst"+i).value=Number(avgst).toFixed(2);
    if(motor)document.getElementById("motor"+i).value=motor;
    if(boat)document.getElementById("boat"+i).value=boat;
    if(win)document.getElementById("win"+i).value=win;
    if(ex)document.getElementById("ex"+i).value=Number(ex).toFixed(2);
    if(exst)document.getElementById("exst"+i).value=Number(exst).toFixed(2);
    if(tilt!==null&&tilt!==undefined)document.getElementById("tilt"+i).value=tilt;
    if(lane)document.getElementById("lane"+i).value=lane;

    autoConvert(i);
  }
}

function extractRacers(obj){
  let arr=[];
  function walk(x){
    if(!x)return;
    if(Array.isArray(x)){
      if(x.length>=6 && x.some(o=>typeof o==="object" && JSON.stringify(o).match(/name|選手|toban|登番|racer/))){
        arr=x.slice(0,6); return;
      }
      x.forEach(walk); return;
    }
    if(typeof x==="object")Object.values(x).forEach(walk);
  }
  walk(obj);
  return arr;
}

function pick(obj,keys){
  if(!obj)return "";
  for(let k of keys){
    for(let key in obj){
      if(String(key).toLowerCase()===String(k).toLowerCase() || String(key).includes(k)){
        return obj[key];
      }
    }
  }
  return "";
}

function pickNum(obj,keys){
  let v=pick(obj,keys);
  if(v===""||v===null||v===undefined)return null;
  let n=Number(String(v).replace("%",""));
  return isNaN(n)?null:n;
}

function autoConvert(i){
  let motor=val("motor"+i), boat=val("boat"+i), win=val("win"+i);
  let turn=5, sashi=5, makuri=5, ms=5;

  if(motor>=50){makuri+=2;ms+=1}
  else if(motor>=40){makuri+=1;ms+=1}
  else if(motor<=25){makuri-=1}

  if(boat>=50){turn+=2;sashi+=1}
  else if(boat>=40){turn+=1}
  else if(boat<=25){turn-=1}

  if(win>=7){sashi+=2;ms+=2;makuri+=1}
  else if(win>=6){sashi+=1;ms+=1}
  else if(win<=4){sashi-=1;ms-=1}

  setVal("turn"+i,clamp(turn,1,10));
  setVal("sashi"+i,clamp(sashi,1,10));
  setVal("makuri"+i,clamp(makuri,1,10));
  setVal("ms"+i,clamp(ms,1,10));
}

function clamp(n,min,max){return Math.max(min,Math.min(max,n))}

function predict(){
  let boats=[];
  let front=document.getElementById("front").value;
  let deep=document.getElementById("deep").value;
  let wind=document.getElementById("wind").value;
  let windSpeed=val("windSpeed");
  let wave=document.getElementById("wave").value;
  let tide=document.getElementById("tide").value;
  let tidePower=document.getElementById("tidePower").value;

  for(let i=1;i<=6;i++){
    boats.push({no:i,lane:val("lane"+i),nige:val("nige"+i),nigashi:val("nigashi"+i),sashi:val("sashi"+i),makuri:val("makuri"+i),ms:val("ms"+i),avgst:val("avgst"+i),exst:val("exst"+i),ex:val("ex"+i),turn:val("turn"+i),tilt:val("tilt"+i),score:0});
  }

  boats.forEach(b=>{
    if(b.no===1)b.score+=b.nige*2.0;
    if(b.no===2)b.score+=b.nigashi*1.5;
    b.score+=b.sashi*1.0+b.ms*1.1;
    if(b.no>=3)b.score+=b.makuri*1.2;

    b.score+=(7-b.ex)*5;
    b.score+=(0.2-b.exst)*50;
    b.score+=(0.2-b.avgst)*35;
    b.score+=b.turn*1.2;
    if(b.tilt>0)b.score+=b.tilt*1.5;

    if(front==="yes"){if(b.lane<=2)b.score-=5;if(b.lane>=4)b.score+=2}
    if(deep==="mid"&&b.no===1)b.score-=3;
    if(deep==="high"&&b.no===1)b.score-=6;
    if(deep==="high"&&b.no>=4)b.score+=3;

    if(wind==="head"){if(b.no<=2)b.score+=windSpeed*.6;if(b.no>=4)b.score-=windSpeed*.4}
    if(wind==="tail"){if(b.no>=3)b.score+=windSpeed*.6;if(b.no===1)b.score-=windSpeed*.3}
    if(wind==="cross"){b.score-=windSpeed*.3;if(b.turn>=7)b.score+=2}

    if(wave==="rough"){if(b.turn>=7)b.score+=2;else b.score-=2}
    if(wave==="bad"){if(b.turn>=8)b.score+=2;else b.score-=4}

    let tm=tidePower==="high"?1.5:tidePower==="mid"?1:.5;
    if(tide==="high"){if(b.turn>=7)b.score+=2*tm;else b.score-=1*tm}
    if(tide==="low"){if(b.makuri>=7||b.ms>=7)b.score+=2*tm}
    if(tide==="rising"){if(b.no<=2)b.score+=2*tm;if(b.sashi>=7)b.score+=1*tm}
    if(tide==="falling"){if(b.no>=3)b.score+=2*tm;if(b.ms>=7||b.makuri>=7)b.score+=1.5*tm}
  });

  boats.sort((a,b)=>b.score-a.score);
  let main=`${boats[0].no}-${boats[1].no}-${boats[2].no}`;
  let sub=`${boats[1].no}-${boats[0].no}-${boats[2].no}`;
  let hole=`${boats[2].no}-${boats[0].no}-${boats[1].no}`;

  let bankroll=val("bankroll");
  let budget=Math.max(500,Math.round(bankroll*.03/100)*100);
  let mainBet=Math.round(budget*.55/100)*100;
  let subBet=Math.round(budget*.30/100)*100;
  let holeBet=Math.max(100,budget-mainBet-subBet);

  let date=document.getElementById("date").value;
  let place=document.getElementById("place").value;
  let race=document.getElementById("race").value;

  let res=`<b>${date} ${place} ${race}</b><br>風：${wind} ${windSpeed}m / 波：${wave} / 潮：${tide}<br><br>
  <div>本線：<span class="ticket hot">${main}</span> ${mainBet}円</div>
  <div>対抗：<span class="ticket">${sub}</span> ${subBet}円</div>
  <div>穴：<span class="ticket">${hole}</span> ${holeBet}円</div><br><b>スコア順</b>`;
  boats.forEach(b=>res+=`<div class="row">${b.no}号艇：${b.score.toFixed(1)}点</div>`);
  document.getElementById("result").innerHTML=res;
}

init();
</script>
</body>
</html>
