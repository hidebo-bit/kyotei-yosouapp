<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競艇 本気展開予想</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#f4f6f8;margin:0;padding:10px}
header{background:#053f8f;color:white;padding:14px;text-align:center;font-weight:bold;font-size:18px;margin:-10px -10px 12px}
.card{background:#fff;padding:14px;border-radius:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
label{font-size:12px;color:#555;display:block;margin-bottom:3px}
input,select{width:100%;box-sizing:border-box;padding:7px 8px;height:38px;border-radius:8px;border:1px solid #ccc;font-size:15px}
button{width:100%;padding:12px;background:#053f8f;color:#fff;border:none;border-radius:10px;font-weight:bold;margin:6px 0}
.green{background:#117a35}.purple{background:#6b4cff}.orange{background:#b36b00}
.ticket{display:inline-block;font-size:21px;font-weight:bold;background:#eef5ff;padding:8px 10px;border-radius:10px;margin:4px 0}
.hot{background:#fff0e6}.row{padding:6px 0;border-bottom:1px solid #eee}.small{font-size:12px;color:#666}
</style>
</head>

<body>
<header>競艇 本気展開予想アプリ</header>

<div class="card">
<h2>レース設定</h2>

<div class="grid">
<div><label>日付</label><input type="date" id="date"></div>

<div><label>場</label><select id="place">
<option value="1">桐生</option><option value="2">戸田</option><option value="3">江戸川</option>
<option value="4">平和島</option><option value="5">多摩川</option><option value="6">浜名湖</option>
<option value="7">蒲郡</option><option value="8">常滑</option><option value="9">津</option>
<option value="10">三国</option><option value="11">びわこ</option><option value="12">住之江</option>
<option value="13">尼崎</option><option value="14">鳴門</option><option value="15">丸亀</option>
<option value="16">児島</option><option value="17">宮島</option><option value="18">徳山</option>
<option value="19">下関</option><option value="20">若松</option><option value="21">芦屋</option>
<option value="22">福岡</option><option value="23">唐津</option><option value="24">大村</option>
</select></div>

<div><label>レース</label><select id="race"></select></div>
<div><label>資金</label><input type="number" id="bankroll" value="10000"></div>

<div><label>前付け</label><select id="front"><option value="no">なし</option><option value="yes">あり</option></select></div>
<div><label>深イン</label><select id="deep"><option value="low">低</option><option value="mid">中</option><option value="high">高</option></select></div>

<div><label>風向き</label><select id="wind"><option value="normal">普通</option><option value="head">向かい風</option><option value="tail">追い風</option><option value="cross">横風</option></select></div>
<div><label>風速(m)</label><input type="number" step="0.5" id="windSpeed" value="2"></div>

<div><label>波</label><select id="wave"><option value="normal">普通</option><option value="rough">荒れ気味</option><option value="bad">かなり荒れ</option></select></div>
<div><label>潮</label><select id="tide"><option value="none">影響少なめ</option><option value="high">満潮</option><option value="low">干潮</option><option value="rising">上げ潮</option><option value="falling">下げ潮</option></select></div>
</div>

<button class="orange" onclick="openPoseidon()">ポセイドンを開く</button>
<button class="purple" onclick="loadPoseidon()">ポセイドンから取得</button>
<p class="small">ポセイドンを開いて確認 → 取得ボタンで数値反映。抽出できない時は手入力でOK。</p>
</div>

<div id="boats"></div>

<button onclick="predict()">展開予想する</button>

<div class="card">
<h2>予想結果</h2>
<div id="result">ここに結果が出ます</div>
</div>

<script>
const WORKER_BASE = "https://odd-surf-f27b.h-kobayashi-0131.workers.dev/";

function init(){
  document.getElementById("date").value = new Date().toISOString().slice(0,10);

  let race = document.getElementById("race");
  for(let i=1;i<=12;i++){
    let o=document.createElement("option");
    o.value=i;
    o.textContent=i+"R";
    race.appendChild(o);
  }
  race.value=1;

  let html="";
  for(let i=1;i<=6;i++){
    html += `
    <div class="card">
      <h2>${i}号艇</h2>
      <div class="grid">
        <div><label>選手ID</label><input id="id${i}" placeholder="登録番号"></div>
        <div><label>選手名</label><input id="name${i}" placeholder="選手名"></div>

        <div><label>読込</label><button onclick="loadPlayer(${i})">特徴読込</button></div>
        <div><label>保存</label><button class="green" onclick="savePlayer(${i})">特徴保存</button></div>

        <div><label>平均ST</label><input type="number" step="0.01" id="avgst${i}" value="0.15"></div>
        <div><label>進入</label><input type="number" id="lane${i}" value="${i}"></div>

        <div><label>逃げ</label><input type="number" id="nige${i}" value="5"></div>
        <div><label>逃がし</label><input type="number" id="nigashi${i}" value="5"></div>
        <div><label>差し</label><input type="number" id="sashi${i}" value="5"></div>
        <div><label>まくり</label><input type="number" id="makuri${i}" value="5"></div>
        <div><label>まくり差し</label><input type="number" id="ms${i}" value="5"></div>
        <div><label>ターン展示</label><input type="number" id="turn${i}" value="6"></div>

        <div><label>展示ST</label><input type="number" step="0.01" id="exst${i}" value="0.15"></div>
        <div><label>展示タイム</label><input type="number" step="0.01" id="ex${i}" value="6.80"></div>
        <div><label>チルト</label><input type="number" step="0.5" id="tilt${i}" value="0"></div>

        <div><label>モーター2連率</label><input type="number" step="0.1" id="motor${i}" value="35"></div>
        <div><label>ボート2連率</label><input type="number" step="0.1" id="boat${i}" value="35"></div>
        <div><label>勝率</label><input type="number" step="0.01" id="win${i}" value="5.00"></div>
      </div>
    </div>`;
  }
  document.getElementById("boats").innerHTML=html;
}

function val(id){return Number(document.getElementById(id).value||0)}
function setVal(id,v){let e=document.getElementById(id);if(e && v!==null && v!==undefined && v!=="")e.value=v}
function getDateYmd(){return document.getElementById("date").value.replaceAll("-","")}
function getPoseidonUrl(){
  const date=getDateYmd();
  const place=document.getElementById("place").value;
  const race=document.getElementById("race").value+"R";
  return `https://poseidon-boatrace.net/race/${date}/${place}/${race}`;
}

function openPoseidon(){
  window.open(getPoseidonUrl(), "_blank");
}

async function loadPoseidon(){
  const target = getPoseidonUrl();
  const api = WORKER_BASE + "?url=" + encodeURIComponent(target);

  try{
    document.getElementById("result").innerHTML = "ポセイドン取得中...";
    const res = await fetch(api);
    const data = await res.json();

    if(!data.ok){
      alert("取得失敗");
      return;
    }

function applyPoseidonHtml(html){
  const doc = new DOMParser().parseFromString(html, "text/html");
  const lines = doc.body.innerText
    .split("\n")
    .map(x => x.trim())
    .filter(Boolean);

  applyPoseidonEntryTable(lines);
  applyPoseidonNewConcept(lines);

  for(let i=1;i<=6;i++){
    autoConvert(i);
  }
}

function applyPoseidonEntryTable(lines){
  for(let idx=0; idx<lines.length; idx++){
    const line = lines[idx];

    // 例：1 河内 悠利杏 B1
    const m = line.match(/^([1-6])\s+(.+?)\s+(A1|A2|B1|B2)$/);
    if(!m) continue;

    const no = Number(m[1]);
    const name = m[2].replace(/\s+/g, "");

    const l1 = lines[idx+1] || "";
    const l2 = lines[idx+2] || "";
    const l3 = lines[idx+3] || "";
    const l4 = lines[idx+4] || "";

    const n1 = nums(l1);
    const n2 = nums(l2);
    const n3 = nums(l3);
    const n4 = nums(l4);

    // l1: 支部 平均ST 全国勝率 全国2連率 当地勝率
    const avgst = n1[0];
    const win = n1[1];

    // l3: モーター2連率 No.xx
    const motorRate = n3[0];

    // l4: ボート2連率
    const boatRate = n4[0];

    setVal(`name${no}`, name);

    if(valid(avgst,0,1)) setVal(`avgst${no}`, avgst.toFixed(2));
    if(valid(win,0,10)) setVal(`win${no}`, win.toFixed(2));
    if(valid(motorRate,0,100)) setVal(`motor${no}`, motorRate.toFixed(1));
    if(valid(boatRate,0,100)) setVal(`boat${no}`, boatRate.toFixed(1));
  }
}

function applyPoseidonNewConcept(lines){
  // 登録番号
  const idIndex = lines.findIndex(x => x.includes("1号艇") && x.includes("6号艇"));
  if(idIndex >= 0){
    const ids = nums(lines[idIndex+1] || "").filter(x => x >= 1000);
    for(let i=1;i<=6;i++){
      if(ids[i-1]){
        setVal(`id${i}`, ids[i-1]);
        loadPlayer(i);
      }
    }
  }

  // 1着率・逃がし率
  const firstRateIndex = lines.findIndex(x => x.includes("1着率") && x.includes("逃がし率"));
  if(firstRateIndex >= 0){
    const section = collectUntil(lines, firstRateIndex, "差され率").join(" ");
    const p = percents(section);

    // 1号艇の逃げ評価
    if(p[0] !== undefined){
      setVal("nige1", rateToScore(p[0]));
    }

    // 2号艇の逃がし評価
    if(p[1] !== undefined){
      setVal("nigashi2", rateToScore(p[1]));
    }
  }

  // 差し率
  const sashiIndex = lines.findIndex(x => x.includes("差し率"));
  if(sashiIndex >= 0){
    const section = collectUntil(lines, sashiIndex, "まくられ率").join(" ");
    const p = percents(section);
    for(let i=1;i<=6;i++){
      if(p[i-1] !== undefined){
        setVal(`sashi${i}`, rateToScore(p[i-1]));
      }
    }
  }

  // まくり率
  const makuriIndex = lines.findIndex(x => x.includes("まくり率"));
  if(makuriIndex >= 0){
    const section = collectUntil(lines, makuriIndex, "2連対率").join(" ");
    const p = percents(section);
    for(let i=1;i<=6;i++){
      if(p[i-1] !== undefined){
        setVal(`makuri${i}`, rateToScore(p[i-1]));
      }
    }
  }

  // 2連対率 → まくり差し/道中力寄りに反映
  const renIndex = lines.findIndex(x => x.includes("2連対率"));
  if(renIndex >= 0){
    const section = collectUntil(lines, renIndex, "※").join(" ");
    const p = percents(section);
    for(let i=1;i<=6;i++){
      if(p[i-1] !== undefined){
        setVal(`ms${i}`, rateToScore(p[i-1]));
      }
    }
  }
}

function collectUntil(lines,startIndex,endWord){
  const arr = [];
  for(let i=startIndex+1;i<lines.length;i++){
    if(lines[i].includes(endWord)) break;
    arr.push(lines[i]);
  }
  return arr;
}

function nums(text){
  const m = String(text).match(/-?\d+(\.\d+)?/g);
  return m ? m.map(Number) : [];
}

function percents(text){
  const m = String(text).match(/\d+(\.\d+)?%/g);
  return m ? m.map(x => Number(x.replace("%",""))) : [];
}

function valid(n,min,max){
  return typeof n === "number" && !isNaN(n) && n >= min && n <= max;
}

function rateToScore(rate){
  if(rate >= 60) return 10;
  if(rate >= 50) return 9;
  if(rate >= 40) return 8;
  if(rate >= 30) return 7;
  if(rate >= 20) return 6;
  if(rate >= 10) return 5;
  if(rate > 0) return 4;
  return 3;
}
    if(name) setVal("name"+i,name);

    if(avgst) setVal("avgst"+i,avgst);
    if(win) setVal("win"+i,win);
    if(motor) setVal("motor"+i,motor);
    if(boat) setVal("boat"+i,boat);

    autoConvert(i);
  }
}

function getBoatText(text,no){
  let marker1 = `${no} `;
  let idx = text.indexOf(marker1);
  if(idx < 0) idx = text.indexOf(`${no}号艇`);
  if(idx < 0) return text;
  let next = text.indexOf(`${no+1} `, idx+10);
  if(no===6 || next<0) next = idx + 900;
  return text.slice(idx, next);
}

function pickFirst(text, regex){
  let m=text.match(regex);
  return m ? m[1] : "";
}

function pickNear(text, keys, regex){
  for(let k of keys){
    let idx=text.indexOf(k);
    if(idx>=0){
      let part=text.slice(idx, idx+120);
      let m=part.match(regex);
      if(m) return m[0];
    }
  }
  let m=text.match(regex);
  return m ? m[0] : "";
}

function guessName(text){
  let m=text.match(/([一-龥ぁ-んァ-ン]{2,6})\s+(A1|A2|B1|B2)/);
  return m ? m[1] : "";
}

function autoConvert(i){
  let motor=val("motor"+i), boat=val("boat"+i), win=val("win"+i);
  let turn=5, sashi=5, makuri=5, ms=5;

  if(motor>=50){makuri+=2;ms+=1}
  else if(motor>=40){makuri+=1;ms+=1}
  else if(motor<=25){makuri-=1}

  if(boat>=50){turn+=2;sashi+=1}
  else if(boat>=40){turn+=1}
  else if(boat<=25){turn-=1}

  if(win>=7){sashi+=2;ms+=2;makuri+=1}
  else if(win>=6){sashi+=1;ms+=1}
  else if(win<=4){sashi-=1;ms-=1}

  setVal("turn"+i,clamp(turn,1,10));
  setVal("sashi"+i,clamp(sashi,1,10));
  setVal("makuri"+i,clamp(makuri,1,10));
  setVal("ms"+i,clamp(ms,1,10));
}

function savePlayer(i){
  let id=document.getElementById("id"+i).value;
  if(!id)return alert("選手IDを入力して");
  let data={
    nige:val("nige"+i),nigashi:val("nigashi"+i),
    sashi:val("sashi"+i),makuri:val("makuri"+i),ms:val("ms"+i)
  };
  localStorage.setItem("player_"+id,JSON.stringify(data));
  alert("選手特徴を保存しました");
}

function loadPlayer(i){
  let id=document.getElementById("id"+i).value;
  if(!id)return;
  let data=JSON.parse(localStorage.getItem("player_"+id)||"null");
  if(!data)return;
  setVal("nige"+i,data.nige);
  setVal("nigashi"+i,data.nigashi);
  setVal("sashi"+i,data.sashi);
  setVal("makuri"+i,data.makuri);
  setVal("ms"+i,data.ms);
}

function clamp(n,min,max){return Math.max(min,Math.min(max,n))}

function predict(){
  let boats=[];
  let front=document.getElementById("front").value;
  let deep=document.getElementById("deep").value;
  let wind=document.getElementById("wind").value;
  let windSpeed=val("windSpeed");
  let wave=document.getElementById("wave").value;
  let tide=document.getElementById("tide").value;

  for(let i=1;i<=6;i++){
    boats.push({
      no:i,lane:val("lane"+i),nige:val("nige"+i),nigashi:val("nigashi"+i),
      sashi:val("sashi"+i),makuri:val("makuri"+i),ms:val("ms"+i),
      avgst:val("avgst"+i),exst:val("exst"+i),ex:val("ex"+i),
      turn:val("turn"+i),tilt:val("tilt"+i),score:0
    });
  }

  boats.forEach(b=>{
    if(b.no===1)b.score+=b.nige*2.0;
    if(b.no===2)b.score+=b.nigashi*1.5;
    b.score+=b.sashi*1.0+b.ms*1.1;
    if(b.no>=3)b.score+=b.makuri*1.2;

    b.score+=(7-b.ex)*5;
    b.score+=(0.2-b.exst)*50;
    b.score+=(0.2-b.avgst)*35;
    b.score+=b.turn*1.2;
    if(b.tilt>0)b.score+=b.tilt*1.5;

    if(front==="yes"){if(b.lane<=2)b.score-=5;if(b.lane>=4)b.score+=2}
    if(deep==="mid"&&b.no===1)b.score-=3;
    if(deep==="high"&&b.no===1)b.score-=6;
    if(deep==="high"&&b.no>=4)b.score+=3;

    if(wind==="head"){if(b.no<=2)b.score+=windSpeed*.6;if(b.no>=4)b.score-=windSpeed*.4}
    if(wind==="tail"){if(b.no>=3)b.score+=windSpeed*.6;if(b.no===1)b.score-=windSpeed*.3}
    if(wind==="cross"){b.score-=windSpeed*.3;if(b.turn>=7)b.score+=2}

    if(wave==="rough"){if(b.turn>=7)b.score+=2;else b.score-=2}
    if(wave==="bad"){if(b.turn>=8)b.score+=2;else b.score-=4}

    if(tide==="rising"){if(b.no<=2)b.score+=2;if(b.sashi>=7)b.score+=1}
    if(tide==="falling"){if(b.no>=3)b.score+=2;if(b.ms>=7||b.makuri>=7)b.score+=1.5}
  });

  boats.sort((a,b)=>b.score-a.score);

  let main=`${boats[0].no}-${boats[1].no}-${boats[2].no}`;
  let sub=`${boats[1].no}-${boats[0].no}-${boats[2].no}`;
  let hole=`${boats[2].no}-${boats[0].no}-${boats[1].no}`;

  let bankroll=val("bankroll");
  let budget=Math.max(500,Math.round(bankroll*.03/100)*100);
  let mainBet=Math.round(budget*.55/100)*100;
  let subBet=Math.round(budget*.30/100)*100;
  let holeBet=Math.max(100,budget-mainBet-subBet);

  let date=document.getElementById("date").value;
  let placeName=document.getElementById("place").selectedOptions[0].textContent;
  let race=document.getElementById("race").value+"R";

  let res=`<b>${date} ${placeName} ${race}</b><br>
  風：${wind} ${windSpeed}m / 波：${wave} / 潮：${tide}<br><br>
  <div>本線：<span class="ticket hot">${main}</span> ${mainBet}円</div>
  <div>対抗：<span class="ticket">${sub}</span> ${subBet}円</div>
  <div>穴：<span class="ticket">${hole}</span> ${holeBet}円</div>
  <br><b>スコア順</b>`;

  boats.forEach(b=>{
    res+=`<div class="row">${b.no}号艇：${b.score.toFixed(1)}点</div>`;
  });

  document.getElementById("result").innerHTML=res;
}

init();
</script>
</body>
</html>
