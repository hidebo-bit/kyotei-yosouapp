<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競艇 本気展開予想</title>

<style>
body{font-family:-apple-system;background:#f4f6f8;margin:0;padding:10px}
header{background:#053f8f;color:white;padding:14px;text-align:center;font-weight:bold;margin:-10px -10px 12px}
.card{background:#fff;padding:14px;border-radius:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
input,select{width:100%;padding:7px;height:36px;border-radius:8px;border:1px solid #ccc}
button{width:100%;padding:12px;background:#053f8f;color:#fff;border:none;border-radius:10px;margin:6px 0}
.orange{background:#b36b00}.purple{background:#6b4cff}
.ticket{font-size:20px;font-weight:bold;background:#eef5ff;padding:6px;border-radius:8px}
</style>
</head>

<body>

<header>競艇 本気展開予想</header>

<div class="card">
<div class="grid">
<input type="date" id="date">
<select id="place">
<option value="23">唐津</option>
<option value="22">福岡</option>
<option value="24">大村</option>
</select>
<select id="race"></select>
</div>

<button class="orange" onclick="openOfficial()">公式</button>
<button class="purple" onclick="loadOfficial()">公式取得</button>
<button class="purple" onclick="loadPoseidon()">ポセイドン取得</button>
</div>

<div id="boats"></div>

<button onclick="predict()">予想</button>

<div class="card">
<div id="result"></div>
</div>

<script>

const WORKER = "https://odd-surf-f27b.h-kobayashi-0131.workers.dev/";

function init(){
 document.getElementById("date").value=new Date().toISOString().slice(0,10);
 for(let i=1;i<=12;i++){
  let o=document.createElement("option");
  o.value=i;o.text=i+"R";
  race.appendChild(o);
 }

 let html="";
 for(let i=1;i<=6;i++){
  html+=`
  <div class="card">
  ${i}号艇
  <input id="name${i}" placeholder="名前">
  <input id="avgst${i}" value="0.15">
  <input id="motor${i}" value="35">
  <input id="boat${i}" value="35">
  <input id="win${i}" value="5">
  </div>`;
 }
 boats.innerHTML=html;
}

function getURL(type){
 let d=date.value.replaceAll("-","");
 let p=place.value;
 let r=race.value;
 if(type==="official"){
  return `https://www.boatrace.jp/owpc/pc/race/racelist?rno=${r}&jcd=${p}&hd=${d}`;
 }
 return `https://poseidon-boatrace.net/race/${d}/${p}/${r}R`;
}

function openOfficial(){
 window.open(getURL("official"));
}

async function loadOfficial(){
 let url=WORKER+"?url="+encodeURIComponent(getURL("official"));
 let res=await fetch(url);
 let data=await res.json();
 applyHTML(data.html);
}

async function loadPoseidon(){
 let url=WORKER+"?url="+encodeURIComponent(getURL("poseidon"));
 let res=await fetch(url);
 let data=await res.json();
 applyHTML(data.html);
}

function applyHTML(html){
 let text=html.replace(/<[^>]+>/g," ");

 let nums=text.match(/\d+\.\d+/g)||[];

 for(let i=1;i<=6;i++){
  if(nums[i]) avgst[i].value=nums[i];
  if(nums[i+6]) win[i].value=nums[i+6];
 }

 let names=text.match(/[一-龥]{2,4}/g)||[];
 for(let i=1;i<=6;i++){
  if(names[i]) name[i].value=names[i];
 }
}

function predict(){
 let score=[];
 for(let i=1;i<=6;i++){
  let s=(0.2-avgst[i].value)*100+motor[i].value+boat[i].value+win[i].value*5;
  score.push({n:i,s:s});
 }
 score.sort((a,b)=>b.s-a.s);

 result.innerHTML=`
 本線 <span class="ticket">${score[0].n}-${score[1].n}-${score[2].n}</span><br>
 対抗 ${score[1].n}-${score[0].n}-${score[2].n}
 `;
}

init();

</script>
</body>
</html>
