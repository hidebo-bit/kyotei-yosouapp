<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競艇 本気予想</title>

<style>
body{font-family:sans-serif;background:#f4f6f8;margin:0;padding:10px}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
input,select{width:100%;padding:6px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box}
button{width:100%;padding:12px;background:#053f8f;color:#fff;border:none;border-radius:10px;font-weight:bold}
.ticket{font-size:20px;font-weight:bold;background:#eef5ff;padding:6px;border-radius:8px;display:inline-block;margin:4px 0}
</style>
</head>

<body>

<div class="card">
<h3>レース設定</h3>

<label>前付け</label>
<select id="front">
<option value="no">なし</option>
<option value="yes">あり</option>
</select>

<label>深イン</label>
<select id="deep">
<option value="low">低</option>
<option value="mid">中</option>
<option value="high">高</option>
</select>
</div>

<div id="boats"></div>

<button onclick="predict()">予想する</button>

<div class="card" id="result">ここに結果</div>

<script>
function savePlayer(i){
  let id = document.getElementById("id"+i).value;
  if(!id) return alert("ID入力して");

  let data = {
    nige: val("nige"+i),
    nigashi: val("nigashi"+i),
    sashi: val("sashi"+i),
    makuri: val("makuri"+i),
    ms: val("ms"+i)
  };

  localStorage.setItem("player_"+id, JSON.stringify(data));
  alert("保存した");
}

function loadPlayer(i){
  let id = document.getElementById("id"+i).value;
  if(!id) return alert("ID入力して");

  let data = JSON.parse(localStorage.getItem("player_"+id));
  if(!data) return alert("保存データなし");

  setVal("nige"+i, data.nige);
  setVal("nigashi"+i, data.nigashi);
  setVal("sashi"+i, data.sashi);
  setVal("makuri"+i, data.makuri);
  setVal("ms"+i, data.ms);
}

function init(){
  let html = "";

  for(let i=1;i<=6;i++){
    html += `
    <div class="card">
      <b>${i}号艇</b>
      <div class="grid">
        <input id="id${i}" placeholder="選手ID">
        <button onclick="loadPlayer(${i})">読込</button>

        <input id="nige${i}" type="number" value="5" placeholder="逃げ">
        <input id="nigashi${i}" type="number" value="5" placeholder="逃がし">

        <input id="sashi${i}" type="number" value="5" placeholder="差し">
        <input id="makuri${i}" type="number" value="5" placeholder="まくり">

        <input id="ms${i}" type="number" value="5" placeholder="まくり差し">
        <button onclick="savePlayer(${i})">保存</button>

        <input id="exst${i}" type="number" step="0.01" value="0.15" placeholder="展示ST">
        <input id="ex${i}" type="number" step="0.01" value="6.80" placeholder="展示タイム">

        <input id="turn${i}" type="number" value="6" placeholder="ターン展示">
      </div>
    </div>
    `;
  }

  document.getElementById("boats").innerHTML = html;
}

function val(id){
  return Number(document.getElementById(id).value || 0);
}

function setVal(id,v){
  document.getElementById(id).value = v;
}

function predict(){
  let front = document.getElementById("front").value;
  let deep = document.getElementById("deep").value;

  let boats = [];

  for(let i=1;i<=6;i++){
    boats.push({
      no:i,
      nige:val("nige"+i),
      nigashi:val("nigashi"+i),
      sashi:val("sashi"+i),
      makuri:val("makuri"+i),
      ms:val("ms"+i),
      exst:val("exst"+i),
      ex:val("ex"+i),
      turn:val("turn"+i)
    });
  }

  boats.forEach(b=>{
    b.score = 0;

    if(b.no === 1){
      b.score += b.nige * 2;
    }

    if(b.no === 2){
      b.score += b.nigashi * 1.5;
    }

    b.score += b.sashi;
    b.score += b.ms;

    if(b.no >= 3){
      b.score += b.makuri * 1.2;
    }

    b.score += (7 - b.ex) * 5;
    b.score += (0.2 - b.exst) * 50;
    b.score += b.turn;

    if(front === "yes" && b.no <= 2){
      b.score -= 5;
    }

    if(deep === "mid" && b.no === 1){
      b.score -= 3;
    }

    if(deep === "high" && b.no === 1){
      b.score -= 6;
    }

    if(deep === "high" && b.no >= 4){
      b.score += 3;
    }
  });

  boats.sort((a,b)=>b.score-a.score);

  let main = `${boats[0].no}-${boats[1].no}-${boats[2].no}`;
  let sub = `${boats[1].no}-${boats[0].no}-${boats[2].no}`;
  let hole = `${boats[2].no}-${boats[0].no}-${boats[1].no}`;

  let res = `
    <div>本線：<span class="ticket">${main}</span></div>
    <div>対抗：<span class="ticket">${sub}</span></div>
    <div>穴：<span class="ticket">${hole}</span></div>
    <hr>
    <b>スコア順</b><br>
  `;

  boats.forEach(b=>{
    res += `${b.no}号艇：${b.score.toFixed(1)}点<br>`;
  });

  document.getElementById("result").innerHTML = res;
}

init();
</script>

</body>
</html>
