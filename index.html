<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競艇 本気予想</title>

<style>
body{font-family:-apple-system;background:#f4f6f8;margin:0;padding:10px}
header{background:#053f8f;color:#fff;padding:14px;text-align:center;font-weight:bold}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
input,select{width:100%;height:36px;border-radius:6px;border:1px solid #ccc}
button{width:100%;padding:10px;background:#053f8f;color:#fff;border:none;border-radius:8px;margin:5px 0}
.ticket{font-size:18px;background:#eef5ff;padding:6px;border-radius:6px}
</style>
</head>

<body>

<header>競艇 本気予想</header>

<div class="card">
<div class="grid">
<input type="date" id="date">

<select id="place">
<option value="23">唐津</option>
<option value="22">福岡</option>
<option value="24">大村</option>
</select>

<select id="race">
<option value="1">1R</option>
<option value="2">2R</option>
<option value="3">3R</option>
<option value="4">4R</option>
<option value="5">5R</option>
<option value="6">6R</option>
<option value="7">7R</option>
<option value="8">8R</option>
<option value="9">9R</option>
<option value="10">10R</option>
<option value="11">11R</option>
<option value="12">12R</option>
</select>
</div>

<button onclick="loadData()">データ取得</button>
</div>

<div id="boats"></div>

<button onclick="predict()">予想</button>

<div class="card" id="result"></div>

<script>

function init(){
  date.value = new Date().toISOString().slice(0,10);
  makeInputs();
}

function makeInputs(){
  let html="";
  for(let i=1;i<=6;i++){
    html+=`
    <div class="card">
    ${i}号艇
    <input id="name${i}">
    <input id="avgst${i}" value="0.15">
    <input id="motor${i}" value="35">
    <input id="boat${i}" value="35">
    <input id="win${i}" value="5">
    </div>`;
  }
  boats.innerHTML=html;
}

function reset(){
  for(let i=1;i<=6;i++){
    name[i].value="";
    avgst[i].value="0.15";
    motor[i].value="35";
    boat[i].value="35";
    win[i].value="5";
  }
}

function getURL(){
  let y=date.value.slice(0,4);
  let d=date.value.replaceAll("-","");
  return `https://boatraceopenapi.github.io/programs/v3/${y}/${d}.json`;
}

async function loadData(){

  reset(); // ←これ重要

  let res = await fetch(getURL());
  let json = await res.json();

  let target = findRace(json);

  if(!target){
    result.innerHTML="データなし";
    return;
  }

  let list = findEntries(target);

  for(let i=1;i<=6;i++){
    let r = list[i-1];
    if(!r) continue;

    name[i].value = pick(r,["name","racerName"]) || "";
    avgst[i].value = pickNum(r,["averageStartTiming"]) || "0.15";
    motor[i].value = pickNum(r,["motorQuinellaRate"]) || "35";
    boat[i].value = pickNum(r,["boatQuinellaRate"]) || "35";
    win[i].value = pickNum(r,["winningRate"]) || "5";
  }

  result.innerHTML="取得OK";
}

function findRace(data){

  let p = place.value;
  let r = Number(race.value);

  let found=null;

  JSON.stringify(data).split("},").forEach(chunk=>{
    if(chunk.includes(`"jcd":"${p}"`) && chunk.includes(`"raceNumber":${r}`)){
      try{
        found=JSON.parse(chunk+"}");
      }catch{}
    }
  });

  return found;
}

function findEntries(obj){
  let arr=[];
  function walk(x){
    if(!x) return;
    if(Array.isArray(x)){
      if(x.length>=6 && JSON.stringify(x).includes("racer")){
        arr=x;
      }
      x.forEach(walk);
    }else if(typeof x==="object"){
      Object.values(x).forEach(walk);
    }
  }
  walk(obj);
  return arr;
}

function pick(o,keys){
  for(let k in o){
    if(keys.some(x=>k.includes(x))) return o[k];
  }
  return "";
}

function pickNum(o,keys){
  let v=pick(o,keys);
  return Number(v)||0;
}

function predict(){
  let arr=[];
  for(let i=1;i<=6;i++){
    let s=(0.2-avgst[i].value)*100+motor[i].value+boat[i].value+win[i].value*5;
    arr.push({n:i,s:s});
  }
  arr.sort((a,b)=>b.s-a.s);

  result.innerHTML=`
  本線 <span class="ticket">${arr[0].n}-${arr[1].n}-${arr[2].n}</span>
  `;
}

init();

</script>

</body>
</html>
