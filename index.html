<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競艇 本気予想（手入力版）</title>

<style>
body{font-family:-apple-system;background:#f4f6f8;margin:0;padding:10px}
header{background:#053f8f;color:#fff;padding:14px;text-align:center;font-weight:bold}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
input,select{width:100%;height:36px;border-radius:6px;border:1px solid #ccc}
button{width:100%;padding:10px;background:#053f8f;color:#fff;border:none;border-radius:8px;margin:5px 0}
.green{background:#0a7f3f}
.orange{background:#b36b00}
.ticket{font-size:18px;background:#eef5ff;padding:6px;border-radius:6px}
</style>
</head>

<body>

<header>競艇 本気予想（手入力）</header>

<div class="card">
<div class="grid">
<input type="date" id="date">
<select id="place">
<option>唐津</option>
<option>福岡</option>
<option>大村</option>
</select>
<select id="race">
<option>1R</option><option>2R</option><option>3R</option>
<option>4R</option><option>5R</option><option>6R</option>
<option>7R</option><option>8R</option><option>9R</option>
<option>10R</option><option>11R</option><option>12R</option>
</select>
</div>

<button class="orange" onclick="openOfficial()">公式を見る</button>
<button class="orange" onclick="openPoseidon()">ポセイドン</button>
</div>

<div id="boats"></div>

<button onclick="predict()">予想</button>

<div class="card" id="result"></div>

<script>

function init(){
 date.value=new Date().toISOString().slice(0,10);
 make();
}

function make(){
 let html="";
 for(let i=1;i<=6;i++){
  html+=`
  <div class="card">
  <b>${i}号艇</b>
  <input id="id${i}" placeholder="選手ID">
  <input id="name${i}" placeholder="名前">

  <button class="green" onclick="save(${i})">保存</button>
  <button onclick="load(${i})">読込</button>

  <div class="grid">
  <input id="avgst${i}" placeholder="平均ST" value="0.15">
  <input id="exst${i}" placeholder="展示ST" value="0.15">
  <input id="ex${i}" placeholder="展示タイム" value="6.80">
  <input id="motor${i}" placeholder="モーター" value="35">
  <input id="boat${i}" placeholder="ボート" value="35">
  <input id="win${i}" placeholder="勝率" value="5">

  <input id="nige${i}" placeholder="逃げ" value="5">
  <input id="nigashi${i}" placeholder="逃がし" value="5">
  <input id="sashi${i}" placeholder="差し" value="5">
  <input id="makuri${i}" placeholder="まくり" value="5">
  <input id="ms${i}" placeholder="まくり差し" value="5">
  <input id="turn${i}" placeholder="ターン" value="6">
  </div>
  </div>`;
 }
 boats.innerHTML=html;
}

function val(id){return Number(document.getElementById(id).value||0)}

function save(i){
 let id=document.getElementById("id"+i).value;
 if(!id)return alert("ID入れて");

 let data={
  nige:val("nige"+i),
  nigashi:val("nigashi"+i),
  sashi:val("sashi"+i),
  makuri:val("makuri"+i),
  ms:val("ms"+i)
 };

 localStorage.setItem("p_"+id,JSON.stringify(data));
 alert("保存OK");
}

function load(i){
 let id=document.getElementById("id"+i).value;
 let d=JSON.parse(localStorage.getItem("p_"+id)||"null");
 if(!d)return;

 nige[i].value=d.nige;
 nigashi[i].value=d.nigashi;
 sashi[i].value=d.sashi;
 makuri[i].value=d.makuri;
 ms[i].value=d.ms;
}

function predict(){
 let arr=[];
 for(let i=1;i<=6;i++){
  let s=0;

  s+= (0.2-val("avgst"+i))*100;
  s+= (0.2-val("exst"+i))*80;
  s+= (7-val("ex"+i))*10;

  s+= val("motor"+i)*1.2;
  s+= val("boat"+i)*1.0;
  s+= val("win"+i)*5;

  if(i==1)s+=val("nige"+i)*3;
  if(i==2)s+=val("nigashi"+i)*2;

  s+=val("sashi"+i)*2;
  s+=val("makuri"+i)*2.5;
  s+=val("ms"+i)*2.2;
  s+=val("turn"+i)*1.5;

  arr.push({n:i,s:s});
 }

 arr.sort((a,b)=>b.s-a.s);

 result.innerHTML=`
 本線 <span class="ticket">${arr[0].n}-${arr[1].n}-${arr[2].n}</span><br>
 対抗 ${arr[1].n}-${arr[0].n}-${arr[2].n}<br>
 穴 ${arr[2].n}-${arr[0].n}-${arr[1].n}
 `;
}

function openOfficial(){
 window.open("https://www.boatrace.jp/");
}

function openPoseidon(){
 window.open("https://poseidon-boatrace.net/");
}

init();

</script>

</body>
</html>
