<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>唐津専用 競艇本気予想</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#f4f6f8;margin:0;padding:10px;color:#111}
header{background:#053f8f;color:#fff;padding:14px;text-align:center;font-weight:bold;font-size:18px;margin:-10px -10px 12px}
.card{background:#fff;padding:12px;border-radius:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
label{font-size:12px;color:#555;display:block;margin-bottom:3px}
input, select{width:100%;height:40px;border-radius:10px;border:1px solid #ccc;padding:8px;font-size:15px;box-sizing:border-box;}
input[type="date"]{appearance:none;-webkit-appearance:none;}
button{width:100%;padding:12px;background:#053f8f;color:#fff;border:none;border-radius:10px;font-weight:bold;margin:6px 0}
.green{background:#117a35}.orange{background:#b36b00}.purple{background:#6b4cff}
.ticket{display:inline-block;font-size:21px;font-weight:bold;background:#eef5ff;padding:8px 10px;border-radius:10px;margin:4px 0}
.hot{background:#fff0e6}.row{padding:6px 0;border-bottom:1px solid #eee}.small{font-size:12px;color:#666}
</style>
</head>

<body>
<header>唐津専用 競艇本気予想</header>

<div class="card">
<h2>レース設定</h2>
<div class="grid">
  <div><label>日付</label><input type="date" id="date"></div>
  <div><label>場</label><input value="唐津" disabled></div>

  <div>
    <label>レース</label>
    <select id="race">
      <option>1R</option><option>2R</option><option>3R</option><option>4R</option>
      <option>5R</option><option>6R</option><option>7R</option><option>8R</option>
      <option>9R</option><option>10R</option><option>11R</option><option>12R</option>
    </select>
  </div>

  <div><label>資金</label><input type="number" id="bankroll" value="10000"></div>

  <div><label>前付け</label><select id="front"><option value="no">なし</option><option value="yes">あり</option></select></div>
  <div><label>深イン</label><select id="deep"><option value="low">低</option><option value="mid">中</option><option value="high">高</option></select></div>

  <div><label>風向き</label><select id="wind"><option value="normal">普通</option><option value="head">向かい風</option><option value="tail">追い風</option><option value="cross">横風</option></select></div>
  <div><label>風速(m)</label><input type="number" step="0.5" id="windSpeed" value="2"></div>

  <div><label>波</label><select id="wave"><option value="normal">普通</option><option value="rough">荒れ気味</option><option value="bad">かなり荒れ</option></select></div>
  <div><label>潮</label><select id="tide"><option value="none">影響少なめ</option><option value="high">満潮</option><option value="low">干潮</option><option value="rising">上げ潮</option><option value="falling">下げ潮</option></select></div>
</div>

<button class="purple" onclick="loadKaratsuMotorBoat()">唐津公式からモーター/ボート率取得</button>
<button class="orange" onclick="openKaratsuPdf()">出走表PDFを開く</button>
<button class="orange" onclick="openMotorPage()">モーターデータを開く</button>
<button class="orange" onclick="openBoatPage()">ボートデータを開く</button>
<p class="small">出走表PDFを見て、選手名・ST・モーター番号・ボート番号を入力 → 取得ボタンで2連率を反映。</p>
</div>

<div id="boats"></div>

<button onclick="predict()">展開予想する</button>

<div class="card">
<h2>予想結果</h2>
<div id="result">ここに結果が出ます</div>
</div>

<script>
const WORKER_BASE = "https://odd-surf-f27b.h-kobayashi-0131.workers.dev/";

let motorMap = {};
let boatMap = {};

function init(){
  document.getElementById("date").value = new Date().toISOString().slice(0,10);
  makeInputs();
}

function makeInputs(){
  let html="";
  for(let i=1;i<=6;i++){
    html+=`
    <div class="card">
      <h2>${i}号艇</h2>
      <div class="grid">
        <div><label>選手ID</label><input id="id${i}" placeholder="登録番号"></div>
        <div><label>選手名</label><input id="name${i}" placeholder="名前"></div>

        <div><label>平均ST</label><input type="number" step="0.01" id="avgst${i}" value="0.15"></div>
        <div><label>勝率</label><input type="number" step="0.01" id="win${i}" value="5.00"></div>

        <div><label>モーター番号</label><input type="number" id="motorNo${i}" placeholder="例 16"></div>
        <div><label>モーター2連率</label><input type="number" step="0.1" id="motor${i}" value="35"></div>

        <div><label>ボート番号</label><input type="number" id="boatNo${i}" placeholder="例 42"></div>
        <div><label>ボート2連率</label><input type="number" step="0.1" id="boat${i}" value="35"></div>

        <div><label>展示ST</label><input type="number" step="0.01" id="exst${i}" value="0.15"></div>
        <div><label>展示タイム</label><input type="number" step="0.01" id="ex${i}" value="6.80"></div>

        <div><label>チルト</label><input type="number" step="0.5" id="tilt${i}" value="0"></div>
        <div><label>進入</label><input type="number" id="lane${i}" value="${i}"></div>

        <div><label>逃げ</label><input type="number" id="nige${i}" value="5"></div>
        <div><label>逃がし</label><input type="number" id="nigashi${i}" value="5"></div>

        <div><label>差し</label><input type="number" id="sashi${i}" value="5"></div>
        <div><label>まくり</label><input type="number" id="makuri${i}" value="5"></div>

        <div><label>まくり差し</label><input type="number" id="ms${i}" value="5"></div>
        <div><label>ターン展示</label><input type="number" id="turn${i}" value="6"></div>
      </div>

      <button class="green" onclick="savePlayer(${i})">特徴保存</button>
      <button onclick="loadPlayer(${i})">特徴読込</button>
    </div>`;
  }
  document.getElementById("boats").innerHTML=html;
}

function val(id){return Number(document.getElementById(id).value||0)}
function setVal(id,v){const e=document.getElementById(id); if(e && v!==undefined && v!==null && v!=="") e.value=v}

function karatsuFetchUrl(url){
  return WORKER_BASE + "?url=" + encodeURIComponent(url);
}

async function fetchHtml(url){
  const res = await fetch(karatsuFetchUrl(url));
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || "取得失敗");
  return data.html;
}

async function loadKaratsuMotorBoat(){
  try{
    document.getElementById("result").innerHTML = "唐津公式データ取得中...";

    const motorHtml = await fetchHtml("https://www.boatrace-karatsu.jp/sp/index.php?page=datafile-mrankdtl");
    const boatHtml = await fetchHtml("https://www.boatrace-karatsu.jp/sp/index.php?page=datafile-boat");

    motorMap = parseRateTable(motorHtml);
    boatMap = parseRateTable(boatHtml);

    for(let i=1;i<=6;i++){
      const mNo = val("motorNo"+i);
      const bNo = val("boatNo"+i);

      if(motorMap[mNo]){
        setVal("motor"+i, motorMap[mNo].rate.toFixed(1));
      }

      if(boatMap[bNo]){
        setVal("boat"+i, boatMap[bNo].rate.toFixed(1));
      }

      autoConvert(i);
    }

    predict();
    alert("モーター/ボート率を反映しました。");

  }catch(e){
    alert("取得エラー：" + e.message);
  }
}

function parseRateTable(html){
  const doc = new DOMParser().parseFromString(html,"text/html");
  const text = doc.body.innerText.replace(/\s+/g," ");

  const map = {};
  const re = /(\d{1,2})\s+[Ａ-ＤA-D]\s+\d{4}\/\d{2}\/\d{2}～\d{4}\/\d{2}\/\d{2}\s+\d+\s+(\d+\.\d)\s+(\d+\.\d+)/g;

  let m;
  while((m = re.exec(text)) !== null){
    const no = Number(m[1]);
    const rate = Number(m[2]);
    const win = Number(m[3]);
    map[no] = {rate, win};
  }

  return map;
}

function autoConvert(i){
  let motor=val("motor"+i);
  let boat=val("boat"+i);
  let win=val("win"+i);

  let turn=5;
  let sashi=val("sashi"+i);
  let makuri=val("makuri"+i);
  let ms=val("ms"+i);

  if(motor>=45){makuri+=2;ms+=1}
  else if(motor>=38){makuri+=1;ms+=1}
  else if(motor<=25){makuri-=1}

  if(boat>=45){turn+=2;sashi+=1}
  else if(boat>=38){turn+=1}
  else if(boat<=25){turn-=1}

  if(win>=6.5){sashi+=2;ms+=2}
  else if(win>=5.5){sashi+=1;ms+=1}
  else if(win<=4){sashi-=1;ms-=1}

  setVal("turn"+i,clamp(turn,1,10));
  setVal("sashi"+i,clamp(sashi,1,10));
  setVal("makuri"+i,clamp(makuri,1,10));
  setVal("ms"+i,clamp(ms,1,10));
}

function savePlayer(i){
  const id=document.getElementById("id"+i).value;
  if(!id)return alert("選手IDを入力して");

  const data={
    nige:val("nige"+i),
    nigashi:val("nigashi"+i),
    sashi:val("sashi"+i),
    makuri:val("makuri"+i),
    ms:val("ms"+i),
    turn:val("turn"+i)
  };

  localStorage.setItem("karatsu_player_"+id,JSON.stringify(data));
  alert("保存しました");
}

function loadPlayer(i){
  const id=document.getElementById("id"+i).value;
  if(!id)return alert("選手IDを入力して");

  const data=JSON.parse(localStorage.getItem("karatsu_player_"+id)||"null");
  if(!data)return alert("保存データなし");

  setVal("nige"+i,data.nige);
  setVal("nigashi"+i,data.nigashi);
  setVal("sashi"+i,data.sashi);
  setVal("makuri"+i,data.makuri);
  setVal("ms"+i,data.ms);
  setVal("turn"+i,data.turn);
}

function clamp(n,min,max){return Math.max(min,Math.min(max,n))}

function predict(){
  const date=document.getElementById("date").value;
  const race=document.getElementById("race").value;
  const front=document.getElementById("front").value;
  const deep=document.getElementById("deep").value;
  const wind=document.getElementById("wind").value;
  const windSpeed=val("windSpeed");
  const wave=document.getElementById("wave").value;
  const tide=document.getElementById("tide").value;

  let boats=[];

  for(let i=1;i<=6;i++){
    boats.push({
      no:i,
      avgst:val("avgst"+i),
      exst:val("exst"+i),
      ex:val("ex"+i),
      tilt:val("tilt"+i),
      motor:val("motor"+i),
      boat:val("boat"+i),
      win:val("win"+i),
      lane:val("lane"+i),
      nige:val("nige"+i),
      nigashi:val("nigashi"+i),
      sashi:val("sashi"+i),
      makuri:val("makuri"+i),
      ms:val("ms"+i),
      turn:val("turn"+i),
      score:0
    });
  }

  boats.forEach(b=>{
    let s=0;

    s+=(0.20-b.avgst)*100;
    s+=(0.20-b.exst)*80;
    s+=(7.00-b.ex)*8;

    s+=b.motor*1.0;
    s+=b.boat*0.8;
    s+=b.win*5;

    if(b.no===1)s+=b.nige*3.2;
    if(b.no===2)s+=b.nigashi*2.4;

    s+=b.sashi*1.8;
    s+=b.makuri*2.0;
    s+=b.ms*2.2;
    s+=b.turn*1.8;

    if(b.tilt>0)s+=b.tilt*3;
    if(b.tilt<0)s+=Math.abs(b.tilt)*1.5;

    // 唐津補正
    if(b.no===1)s+=4;
    if(b.lane<=2)s+=1.5;
    if(windSpeed>=4 && (b.ms>=7||b.sashi>=7))s+=3;

    if(front==="yes"){
      if(b.lane<=2)s-=6;
      if(b.lane>=4)s+=3;
    }

    if(deep==="mid"){
      if(b.no===1)s-=3;
      if(b.lane>=4)s+=1;
    }

    if(deep==="high"){
      if(b.no===1)s-=7;
      if(b.lane>=4)s+=4;
    }

    if(wind==="head"){
      if(b.lane<=2)s+=windSpeed*0.7;
      if(b.lane>=4)s-=windSpeed*0.4;
    }

    if(wind==="tail"){
      if(b.lane>=3)s+=windSpeed*0.7;
      if(b.no===1)s-=windSpeed*0.3;
    }

    if(wind==="cross"){
      s-=windSpeed*0.3;
      if(b.turn>=7)s+=3;
    }

    if(wave==="rough"){
      if(b.turn>=7)s+=3;
      else s-=2;
    }

    if(wave==="bad"){
      if(b.turn>=8)s+=2;
      else s-=5;
    }

    if(tide==="rising"){
      if(b.lane<=2)s+=2;
      if(b.sashi>=7)s+=2;
    }

    if(tide==="falling"){
      if(b.lane>=3)s+=2;
      if(b.makuri>=7||b.ms>=7)s+=3;
    }

    b.score=s;
  });

  boats.sort((a,b)=>b.score-a.score);

  const main=`${boats[0].no}-${boats[1].no}-${boats[2].no}`;
  const sub=`${boats[1].no}-${boats[0].no}-${boats[2].no}`;
  const hole=`${boats[2].no}-${boats[0].no}-${boats[1].no}`;

  const bankroll=val("bankroll");
  const budget=Math.max(500,Math.round(bankroll*0.03/100)*100);
  const mainBet=Math.round(budget*0.55/100)*100;
  const subBet=Math.round(budget*0.30/100)*100;
  const holeBet=Math.max(100,budget-mainBet-subBet);

  let rough=0;
  if(boats[0].no!==1)rough+=25;
  if(windSpeed>=4)rough+=15;
  if(windSpeed>=6)rough+=15;
  if(wave==="rough")rough+=15;
  if(wave==="bad")rough+=30;
  if(front==="yes")rough+=15;
  if(deep==="high")rough+=15;

  let roughLabel="低";
  if(rough>=40)roughLabel="中";
  if(rough>=70)roughLabel="高";

  let html=`
    <b>${date} 唐津 ${race}</b><br>
    風：${wind} ${windSpeed}m / 波：${wave} / 潮：${tide}<br>
    荒れ度：<b>${roughLabel}</b><br><br>

    <div>本線：<span class="ticket hot">${main}</span> ${mainBet}円</div>
    <div>対抗：<span class="ticket">${sub}</span> ${subBet}円</div>
    <div>穴：<span class="ticket">${hole}</span> ${holeBet}円</div>

    <br><b>スコア順</b>
  `;

  boats.forEach(b=>{
    html+=`<div class="row">${b.no}号艇：${b.score.toFixed(1)}点</div>`;
  });

  document.getElementById("result").innerHTML=html;
}

function openKaratsuPdf(){
  window.open("https://www.boatrace-karatsu.jp/sp/index.php?page=raceinfo-pdf","_blank");
}

function openMotorPage(){
  window.open("https://www.boatrace-karatsu.jp/sp/index.php?page=datafile-mrankdtl","_blank");
}

function openBoatPage(){
  window.open("https://www.boatrace-karatsu.jp/sp/index.php?page=datafile-boat","_blank");
}

init();
</script>
</body>
</html>
